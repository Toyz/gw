name: integration

# Real end-to-end integration for the polyglot task runner. It installs the
# actual toolchains (Go + Rust/cargo + Python/uv), scaffolds a genuine polyglot
# workspace (a Go module, a real Cargo crate, a real uv project), and drives the
# built gw against it — asserting `gw test` runs real `go test` / `cargo test` /
# `uv run pytest` and `gw affected --projects` is correct. Build-tagged so the
# normal `ci` suite (which must not need rust/uv) never runs it.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch: {} # run on demand from the Actions tab

jobs:
  real-integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v7
        with:
          go-version: stable

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install uv
        uses: astral-sh/setup-uv@v8.3.2

      - name: Toolchain versions
        run: |
          go version
          cargo --version
          uv --version

      - name: Real polyglot integration (go + cargo + uv)
        run: go test -tags integration -count=1 -v -run RealPolyglot ./internal/cmd/...
