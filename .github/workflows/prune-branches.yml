name: Prune merged branches

# Deletes any branch whose tip is already merged into main (fully an ancestor),
# regardless of how it was merged (PR or local). main/HEAD are never touched.
on:
  schedule:
    - cron: "0 3 * * 1" # Mondays 03:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  prune:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Delete branches merged into main
        run: |
          set -euo pipefail
          git fetch --prune origin '+refs/heads/*:refs/remotes/origin/*'
          branches=$(git for-each-ref --format='%(refname:lstrip=3)' refs/remotes/origin \
            | grep -vE '^(main|HEAD)$' || true)
          for b in $branches; do
            if git merge-base --is-ancestor "origin/$b" origin/main; then
              echo "· deleting merged branch: $b"
              git push origin --delete "$b"
            else
              echo "· keeping (not merged): $b"
            fi
          done
